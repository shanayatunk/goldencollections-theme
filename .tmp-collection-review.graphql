query($id: ID!) {
  collection(id: $id) {
    id
    title
    handle
    description
    descriptionHtml
    seo {
      title
      description
    }
    image {
      url
      altText
    }
    productsCount { count precision }
    products(first: 20) {
      nodes {
        id
        title
        handle
        vendor
        productType
        tags
        featuredImage { url altText }
      }
    }
  }
}
